<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-black via-gray-900 to-black text-white min-h-screen p-4">

<!-- HEADER -->
<div class="mb-6 flex justify-between items-center">
  <div>
    <h2 class="text-2xl font-bold">📊 Customer Dashboard</h2>
    <p class="text-gray-400 text-sm">Live statement & balance</p>
  </div>

  <button onclick="downloadPDF()" class="bg-blue-600 px-4 py-2 rounded-xl text-sm">
    ⬇️ PDF
  </button>
</div>

<!-- SUMMARY CARDS -->
<div id="summaryCards" class="grid grid-cols-3 gap-3 mb-4"></div>

<!-- PAY SECTION -->
<div id="payBox" class="bg-white/5 backdrop-blur-lg rounded-2xl p-4 mb-6 hidden">
  <h3 class="font-semibold mb-3">⚡ Pay Now</h3>

  <!-- MOBILE -->
  <a id="upiBtn"
    class="hidden block text-center bg-green-600 p-3 rounded-xl mb-3">
    💰 Pay via UPI
  </a>

  <!-- DESKTOP -->
  <button id="qrBtn"
    onclick="showQR()"
    class="hidden w-full bg-blue-600 p-3 rounded-xl mb-3">
    📷 Show QR Code
  </button>

  <!-- QR -->
  <div id="qrBox" class="hidden text-center">
    <img id="qrImg" class="w-40 mx-auto rounded-xl mb-2" />
    <div class="text-xs text-gray-400">Scan to Pay</div>
  </div>
</div>

<!-- TRANSACTIONS -->
<div class="bg-white/5 backdrop-blur-lg rounded-2xl p-4 shadow-lg">
  <div class="flex justify-between mb-3">
    <h3 class="font-semibold">Transactions</h3>
    <span id="count" class="text-xs text-gray-400"></span>
  </div>

  <div id="summary" class="space-y-3 max-h-[65vh] overflow-auto"></div>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycby1evVUcrHJ1f2Byhr1EeyCq4tNBF3GDki_YBD4Chz0lWpva7d3x7sNh2CpRiayg4WJ/exec";

const urlParams = new URLSearchParams(window.location.search);
const customerId = urlParams.get("customer");
const businessId = urlParams.get("bid");

loadSummary();

// ================= LOAD =================
async function loadSummary(){

  document.getElementById("summary").innerHTML = "Loading...";

  const res = await fetch(`${API}?action=getCustomerTransactions&bid=${businessId}&cid=${customerId}&env=test`);
  const data = await res.json();

  let give = 0, get = 0;

  data.transactions.forEach(t => {
    if(t.type === "gave") give += Number(t.amount);
    else get += Number(t.amount);
  });

  renderCards(give, get);
  setupPayment(give, get);

  let html = "";

  data.transactions.reverse().forEach(t => {

    html += `
    <div class="flex justify-between items-center bg-white/5 p-3 rounded-xl hover:bg-white/10 transition">

      <div>
        <div class="text-sm font-medium">${new Date(t.date).toLocaleDateString()}</div>
        <div class="text-xs text-gray-400">Balance ₹${t.runningBalance}</div>
      </div>

      <div class="text-right">
        <div class="font-bold ${t.type === 'gave' ? 'text-red-400' : 'text-green-400'}">
          ${t.type === 'gave' ? '-' : '+'}₹${t.amount}
        </div>
        <div class="text-xs text-gray-400">${t.note || ''}</div>
      </div>

    </div>`;
  });

  document.getElementById("summary").innerHTML = html || "No Transactions";
  document.getElementById("count").innerText = data.transactions.length + " entries";
}

// ================= SUMMARY =================
function renderCards(give, get){

  const net = get - give;
  const isPositive = net >= 0;

  const netColor = isPositive ? "text-green-400" : "text-red-400";
  const label = isPositive ? "You Will Receive" : "You Need to Pay";

  const badge = isPositive
    ? `<span class="bg-green-500/20 text-green-400 px-2 py-1 rounded-full text-xs">${label}</span>`
    : `<span class="bg-red-500/20 text-red-400 px-2 py-1 rounded-full text-xs">${label}</span>`;

  document.getElementById("summaryCards").innerHTML = `

  <div class="bg-red-500/10 p-4 rounded-2xl text-center">
    <div class="text-xs text-gray-400">You Received</div>
    <div class="text-lg font-bold text-red-400">₹${get}</div>
  </div>

  <div class="bg-green-500/10 p-4 rounded-2xl text-center">
    <div class="text-xs text-gray-400">You Paid</div>
    <div class="text-lg font-bold text-green-400">₹${give}</div>
  </div>

  <div class="bg-white/10 p-4 rounded-2xl text-center">
    <div class="text-xs text-gray-400">Balance</div>
    <div class="text-lg font-bold ${netColor}">
      ₹${Math.abs(net)}
    </div>
    <div class="mt-1">${badge}</div>
  </div>

  `;
}

// ================= PAYMENT =================
function setupPayment(give, get){

  const net = get - give;

  if(net < 0){

    const amount = Math.abs(net);

    const upi = "sudhakarrn0711@okicici"; // change dynamically later
    const name = "Business";

    const upiLink = `upi://pay?pa=${upi}&pn=${name}&am=${amount}&cu=INR`;

    document.getElementById("payBox").classList.remove("hidden");

    const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

    if(isMobile){
      const btn = document.getElementById("upiBtn");
      btn.href = upiLink;
      btn.classList.remove("hidden");
    } else {
      document.getElementById("qrBtn").classList.remove("hidden");
      window.currentUPI = upiLink;
    }
  }
}

// ================= QR =================
function showQR(){

  const qrBox = document.getElementById("qrBox");

  if(qrBox.classList.contains("hidden")){

    document.getElementById("qrImg").src =
      `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(window.currentUPI)}`;

    qrBox.classList.remove("hidden");

  } else {
    qrBox.classList.add("hidden");
  }
}

// ================= PDF =================
function downloadPDF(){
  window.print();
}

</script>

</body>
</html>
